version: '3.9'

services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: codejudge
      POSTGRES_USER: judge
      POSTGRES_PASSWORD: judgepass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge -d codejudge"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://judge:judgepass@db:5432/codejudge
      - SECRET_KEY=supersecretkey123changeinproduction
      - OBJC_DISABLE_INITIALIZE_FORK_SAFETY=YES
    volumes:
      - ./api:/app
      - /var/run/docker.sock:/var/run/docker.sock
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./api
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://judge:judgepass@db:5432/codejudge
      - SECRET_KEY=supersecretkey123changeinproduction
      - OBJC_DISABLE_INITIALIZE_FORK_SAFETY=YES
    volumes:
      - ./api:/app
      - /var/run/docker.sock:/var/run/docker.sock
    command: rq worker --url redis://redis:6379

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./frontend/src:/app/src
    environment:
      - REACT_APP_API_URL=http://localhost:8000

volumes:
  postgres_data: